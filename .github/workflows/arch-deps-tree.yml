name: arch-deps-tree

on:
  workflow_dispatch:
  push:
    paths:
      - pkglist.txt
      - .github/workflows/arch-deps-tree.yml

jobs:
  deps:
    runs-on: ubuntu-latest

    container:
      image: archlinux:base-devel

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Init keyring + tools + chaotic-aur
        run: |
          pacman-key --init
          pacman -Sy --noconfirm archlinux-keyring
          pacman -Syu --noconfirm

          # Chaotic AUR
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-keyring.pkg.tar.zst'
          pacman -U --noconfirm 'https://cdn-mirror.chaotic.cx/chaotic-aur/chaotic-mirrorlist.pkg.tar.zst'

          cat >> /etc/pacman.conf <<'EOF'

          [chaotic-aur]
          Include = /etc/pacman.d/chaotic-mirrorlist
          EOF

          pacman -Syu --noconfirm
          pacman -S --noconfirm pacman-contrib python

      - name: Generate dedup tree + all-deps list + summary
        run: |
          cat > arch_tree.py <<'PY'
          import re, sys, subprocess
          from collections import defaultdict

          PKGLIST = sys.argv[1]
          OUT_TREE = "deps.tree.txt"
          OUT_ALL  = "all-deps.txt"

          SYNTHETIC = {"START", "END"}

          def read_pkglist(path):
              pkgs = []
              for line in open(path, "r", encoding="utf-8"):
                  line = line.strip()
                  if not line or line.startswith("#"):
                      continue
                  pkgs.append(line)
              return pkgs

          roots = read_pkglist(PKGLIST)
          explicit = set(roots)

          # ---------- Build graph via pactree ----------
          edge_re = re.compile(r'"([^"]+)"\s*->\s*"([^"]+)"')
          deps  = defaultdict(set)   # parent -> {child, ...}
          rdeps = defaultdict(set)   # child  -> {parent, ...}
          failed = []                # pacotes que o pactree não resolveu

          for r in roots:
              p = subprocess.run(
                  ["pactree", "-s", "-g", r],
                  text=True, capture_output=True,
              )
              if p.returncode != 0:
                  msg = p.stderr.strip()
                  print(f"# WARN pactree failed for {r}: {msg}", file=sys.stderr)
                  failed.append((r, msg))
                  continue

              for a, b in edge_re.findall(p.stdout):
                  if a in SYNTHETIC or b in SYNTHETIC:
                      continue
                  deps[a].add(b)
                  rdeps[b].add(a)

          # ---------- Reachability ----------
          def reachable(start):
              seen = set()
              stack = [start]
              while stack:
                  cur = stack.pop()
                  for ch in deps.get(cur, ()):
                      if ch not in seen:
                          seen.add(ch)
                          stack.append(ch)
              return seen

          reach = {r: reachable(r) for r in roots}

          # ---------- Helpers ----------
          def find_any_path(start, target):
              stack = [(start, [start])]
              seen = set()
              while stack:
                  cur, path = stack.pop()
                  if cur == target:
                      return path
                  if cur in seen:
                      continue
                  seen.add(cur)
                  for ch in deps.get(cur, ()):
                      if ch not in path:
                          stack.append((ch, path + [ch]))
              return None

          def fmt_path(path):
              if not path:
                  return None
              if len(path) > 10:
                  return " -> ".join(path[:3] + ["..."] + path[-2:])
              return " -> ".join(path)

          def sort_parents(parents):
              return sorted(parents, key=lambda x: (0 if x in explicit else 1, x))

          # ========================================================
          #  1) deps.tree.txt  —  árvore visual + resumo
          # ========================================================
          with open(OUT_TREE, "w", encoding="utf-8", newline="\n") as out:
              def o(s=""):
                  print(s, file=out)

              expanded = set()

              def node_label(name, is_root=False):
                  tags = []
                  if name in explicit:
                      tags.append("explicit")
                  if is_root:
                      tags.append("root")
                  return name + ("" if not tags else " " + " ".join(f"[{t}]" for t in tags))

              def print_subtree(pkg, prefix, is_last, stack):
                  branch       = "└── " if is_last else "├── "
                  cont_prefix  = "    " if is_last else "│   "

                  if pkg in stack:
                      o(prefix + branch + f"{pkg} [cycle]")
                      return

                  if pkg in explicit:
                      o(prefix + branch + f"{pkg} [explicit] [ref]")
                      return

                  if pkg in expanded:
                      o(prefix + branch + f"{pkg} [ref]")
                      return

                  o(prefix + branch + pkg)
                  expanded.add(pkg)

                  children = sorted(deps.get(pkg, ()))
                  if not children:
                      return

                  new_stack = set(stack)
                  new_stack.add(pkg)

                  for i, ch in enumerate(children):
                      print_subtree(ch, prefix + cont_prefix, i == len(children) - 1, new_stack)

              # ---- Forest ----
              for r in roots:
                  o(node_label(r, is_root=True))
                  children = sorted(deps.get(r, ()))
                  for j, ch in enumerate(children):
                      print_subtree(ch, "", j == len(children) - 1, {r})
                  o()

              # ---- Summary A: redundantes ----
              o("# ===== Resumo (pkglist) =====")
              o("# A) Pacotes da lista que já são dependência de OUTROS da lista (candidatos a remover):")

              redundant = []
              for p in roots:
                  pullers = sorted(r for r in roots if r != p and p in reach.get(r, set()))
                  if pullers:
                      redundant.append((p, pullers))

              if redundant:
                  for p, pullers in sorted(redundant, key=lambda x: x[0]):
                      parents_raw = [x for x in rdeps.get(p, set()) if x not in SYNTHETIC and x != p]
                      parents = sort_parents(parents_raw)

                      o(f"# - {p}")
                      o(f"#   puxado por (roots): {', '.join(pullers)}")
                      if parents:
                          o(f"#   pais diretos:       {', '.join(parents)}")
                      for r in pullers:
                          path = find_any_path(r, p)
                          if path:
                              o(f"#   exemplo ({r}): {fmt_path(path)}")
                      o("#")
              else:
                  o("#   (nenhum)")
              o()

              # ---- Summary B: não puxados ----
              o("# B) Pacotes da lista que NÃO são dependência de nenhum outro (no grafo gerado):")
              not_pulled = [p for p in roots
                            if not any(x for x in rdeps.get(p, set()) if x not in SYNTHETIC and x != p)]
              if not_pulled:
                  for p in sorted(not_pulled):
                      o(f"# - {p}")
              else:
                  o("#   (nenhum)")
              o()

              # ---- Summary C: falhas ----
              if failed:
                  o("# C) Pacotes que o pactree NÃO conseguiu resolver (AUR / inexistente / typo):")
                  for pkg, msg in sorted(failed, key=lambda x: x[0]):
                      o(f"# - {pkg}  ({msg})")
                  o()

              # ---- Stats ----
              all_pkgs = set(roots)
              for r in roots:
                  all_pkgs.update(reach.get(r, set()))

              only_deps = all_pkgs - explicit
              o(f"# Totais: {len(explicit)} explícitos, "
                f"{len(only_deps)} dependências, "
                f"{len(all_pkgs)} pacotes únicos no total")

          # ========================================================
          #  2) all-deps.txt  —  lista plana de TODOS os pacotes
          # ========================================================
          all_pkgs = set(roots)
          for r in roots:
              all_pkgs.update(reach.get(r, set()))

          only_deps = sorted(all_pkgs - explicit)
          explicit_sorted = sorted(explicit)

          with open(OUT_ALL, "w", encoding="utf-8", newline="\n") as f:
              f.write(f"# Gerado automaticamente a partir de {PKGLIST}\n")
              f.write(f"# Explícitos (pkglist):     {len(explicit)}\n")
              f.write(f"# Dependências transitivas: {len(only_deps)}\n")
              f.write(f"# Total único:              {len(all_pkgs)}\n")
              f.write("#\n")
              f.write("# [E] = explícito (está na pkglist)\n")
              f.write("# [D] = dependência transitiva\n")
              f.write("#\n")
              for p in sorted(all_pkgs):
                  tag = "[E]" if p in explicit else "[D]"
                  f.write(f"{tag} {p}\n")

          print(f"Wrote {OUT_TREE}  ({len(roots)} roots)")
          print(f"Wrote {OUT_ALL}  ({len(all_pkgs)} packages total)")
          PY

          python arch_tree.py pkglist.txt
          echo "===== deps.tree.txt ====="
          cat deps.tree.txt
          echo ""
          echo "===== all-deps.txt ====="
          cat all-deps.txt

      - name: Upload reports
        uses: actions/upload-artifact@v6
        with:
          name: arch-deps-tree
          path: |
            deps.tree.txt
            all-deps.txt
